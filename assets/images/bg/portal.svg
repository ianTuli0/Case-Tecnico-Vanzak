<svg width="380" height="66" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Definição do grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
    </pattern>

    <!-- Gradiente azul -->
    <linearGradient id="blueGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f80ed"/>
      <stop offset="100%" stop-color="#1c5db6"/>
    </linearGradient>

    <!-- Clip para manter o grid dentro da elipse -->
    <clipPath id="clipEllipse">
      <ellipse cx="300" cy="100" rx="250" ry="60"/>
    </clipPath>
  </defs>

  <!-- Elipse base -->
  <ellipse cx="300" cy="100" rx="250" ry="60" fill="url(#blueGradient)" />

  <!-- Grid dentro da elipse -->
  <rect width="600" height="200" fill="url(#grid)" clip-path="url(#clipEllipse)" />
</svg>